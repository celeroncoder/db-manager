name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.10'

      - name: Build release binary
        run: swift build -c release

      - name: Create .iconset from PNGs
        run: |
          mkdir -p DBManager.iconset
          ICON_SRC="DBManager/Assets.xcassets/AppIcon.appiconset"
          cp "$ICON_SRC/icon_16.png"   DBManager.iconset/icon_16x16.png
          cp "$ICON_SRC/icon_32.png"   DBManager.iconset/icon_16x16@2x.png
          cp "$ICON_SRC/icon_32.png"   DBManager.iconset/icon_32x32.png
          cp "$ICON_SRC/icon_64.png"   DBManager.iconset/icon_32x32@2x.png
          cp "$ICON_SRC/icon_128.png"  DBManager.iconset/icon_128x128.png
          cp "$ICON_SRC/icon_256.png"  DBManager.iconset/icon_128x128@2x.png
          cp "$ICON_SRC/icon_256.png"  DBManager.iconset/icon_256x256.png
          cp "$ICON_SRC/icon_512.png"  DBManager.iconset/icon_256x256@2x.png
          cp "$ICON_SRC/icon_512.png"  DBManager.iconset/icon_512x512.png
          cp "$ICON_SRC/icon_1024.png" DBManager.iconset/icon_512x512@2x.png
          iconutil -c icns DBManager.iconset -o AppIcon.icns

      - name: Assemble .app bundle
        run: |
          APP="DB Manager.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp .build/release/DBManager "$APP/Contents/MacOS/DBManager"
          chmod +x "$APP/Contents/MacOS/DBManager"
          cp DBManager/Info.plist "$APP/Contents/Info.plist"
          cp AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"

      - name: Package artifact
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent "DB Manager.app" release/DBManager-macos-arm64.zip
          shasum -a 256 release/DBManager-macos-arm64.zip > release/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/DBManager-macos-arm64.zip
            release/checksums.txt
