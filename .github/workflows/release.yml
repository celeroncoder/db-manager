name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '5.10'

      - name: Build release binary
        run: swift build -c release

      - name: Prepare artifact
        run: |
          mkdir -p release
          cp .build/release/DBManager release/DBManager
          chmod +x release/DBManager
          cd release && tar -czf DBManager-macos-arm64.tar.gz DBManager
          cd .. && shasum -a 256 release/DBManager-macos-arm64.tar.gz > release/checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/DBManager-macos-arm64.tar.gz
            release/checksums.txt
